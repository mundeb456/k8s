# Comparison Table

| Resource | Purpose | Rolling Update | Rollback | Stable Pod Name | One Pod Per Node |
|-----------|---------|----------------|----------|-----------------|------------------|
| ReplicationController | Maintains Pod replicas | ❌ | ❌ | ❌ | ❌ |
| ReplicaSet | Maintains Pod replicas | ❌ | ❌ | ❌ | ❌ |
| Deployment | Manages ReplicaSets | ✅ | ✅ | ❌ | ❌ |
| StatefulSet | Stateful Applications | ✅ | ✅ | ✅ | ❌ |
| DaemonSet | One Pod on every node | Limited | ❌ | ❌ | ✅ |

---

# Interview Tips

### ReplicationController (RC)
- Legacy controller.
- Supports only equality-based selectors.
- Replaced by ReplicaSet.

### ReplicaSet (RS)
- Maintains desired Pod replicas.
- Supports set-based label selectors.
- Usually managed by a Deployment.

### Deployment
- Most commonly used resource.
- Supports rolling updates and rollbacks.
- Automatically manages ReplicaSets.

### StatefulSet
- Used for stateful applications.
- Requires a Headless Service.
- Provides stable Pod names, DNS, and persistent storage.

### DaemonSet
- Schedules one Pod on every eligible node.
- Ideal for logging, monitoring, and networking agents.
